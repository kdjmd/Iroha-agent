name: Windows build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Windows application
        shell: powershell
        run: ./desktop/build.ps1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: IrohaAgent-Windows
          path: desktop/dist/
          if-no-files-found: error
